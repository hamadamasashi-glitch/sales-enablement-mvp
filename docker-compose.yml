services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_mvp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sales_mvp?schema=public
      JWT_SECRET: local-dev-secret
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
    environment:
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_APP_NAME: Sales Enablement MVP
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
